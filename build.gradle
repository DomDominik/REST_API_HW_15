plugins {
    id 'java-library'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation(
            "org.junit.jupiter:junit-jupiter-api:5.14.3",
            "org.junit.jupiter:junit-jupiter-engine:5.14.3",
            "org.junit.platform:junit-platform-launcher:1.14.3",
            "org.junit.platform:junit-platform-engine:1.14.3",
            "io.rest-assured:rest-assured:6.0.0",
            "io.rest-assured:json-schema-validator:6.0.0"
    )
    testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine:5.14.3")
}

tasks.withType(Test) {
    useJUnitPlatform()
    systemProperties(System.getProperties())

    testLogging {
        lifecycle {
            events "started", "skipped", "failed", "standard_error", "standard_out"
            exceptionFormat "short"
        }
    }
}